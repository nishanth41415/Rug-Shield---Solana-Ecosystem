version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: rugshield-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: rugshield-postgres
    environment:
      POSTGRES_USER: rugshield
      POSTGRES_PASSWORD: rugshield123
      POSTGRES_DB: rugshield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:

